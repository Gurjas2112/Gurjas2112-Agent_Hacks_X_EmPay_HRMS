# ============================================================
# EmPay HRMS - Docker Compose
# ============================================================
# Runs Odoo 19.0 CE + PostgreSQL 16 with the empay_hrms module
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f odoo   # View Odoo logs
#   docker-compose down -v        # Stop and remove volumes
#
# Access:
#   Odoo Web:  http://localhost:8069
#   DB Admin:  http://localhost:8069/web/database/manager
# ============================================================

services:
  # ============================================================
  # PostgreSQL 16 Database
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: empay_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_empay_2026
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - empay_pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - empay_network

  # ============================================================
  # Odoo 19.0 Application Server
  # ============================================================
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empay_odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"     # Odoo Web
      - "8071:8071"     # Longpolling
      - "8072:8072"     # WebSocket (real-time bus)
    volumes:
      # Mount the module for live development (hot-reload without rebuild)
      - ./empay_hrms:/mnt/extra-addons/empay_hrms
      # Persistent Odoo data (filestore, sessions)
      - empay_odoo_data:/var/lib/odoo
      # Custom config
      - ./docker/odoo.conf:/etc/odoo/odoo.conf:ro
    environment:
      - HOST=db
      - PORT=5432
      - USER=odoo
      - PASSWORD=odoo_empay_2026
    networks:
      - empay_network

# ============================================================
# Volumes
# ============================================================
volumes:
  empay_pgdata:
    driver: local
  empay_odoo_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  empay_network:
    driver: bridge
