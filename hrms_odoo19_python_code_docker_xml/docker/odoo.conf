[options]
; ============================================================
; EmPay HRMS - Odoo Configuration
; ============================================================

; Admin password for database management (change in production!)
admin_passwd = empay_admin_2026

; Database connection
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_empay_2026
db_name = False
db_template = template0
db_maxconn = 64

; Module paths
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Server settings
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; Workers (0 = threaded mode for development)
; For production, set workers = 4+ and enable gevent_port
workers = 0
max_cron_threads = 2

; Logging
log_level = info
log_handler = :INFO
logfile = /var/log/odoo/odoo-server.log

; Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; Data directory
data_dir = /var/lib/odoo

; CSV separator
csv_internal_sep = ,

; Enable real-time bus (websocket/longpolling)
; Odoo 19 uses websocket by default when workers > 0
; In threaded mode (workers=0), longpolling works on the same port

; Restrict database creation to admin (security)
list_db = True

; Email (configure for production)
smtp_server = localhost
smtp_port = 25
smtp_ssl = False

; Server-wide modules (always load bus for real-time)
server_wide_modules = base,web,bus
